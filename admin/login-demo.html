<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Login - Runyakitara Hub (Demo)</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&family=Playfair+Display:wght@600;700;800&display=swap" rel="stylesheet">
    
    <!-- Bootstrap Icons -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <link rel="stylesheet" href="../css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body class="login-page">
    <div class="login-container">
        <div class="login-background">
            <div class="login-pattern"></div>
            <div class="login-gradient"></div>
        </div>
        
        <div class="login-content">
            <div class="login-box">
                <div class="login-header">
                    <div class="login-logo">
                        <i class="bi bi-translate"></i>
                    </div>
                    <h1>Runyakitara Hub</h1>
                    <p>Admin Portal</p>
                </div>
                
                <!-- Demo Notice -->
                <div class="success-message" style="margin-bottom: 1.5rem;">
                    <i class="bi bi-info-circle"></i>
                    <span>This is a demo preview. Set up the database to enable login.</span>
                </div>
                
                <form class="login-form" onsubmit="return false;">
                    <div class="form-group">
                        <label for="username">
                            <i class="bi bi-person"></i>
                            Username
                        </label>
                        <div class="input-wrapper">
                            <input type="text" id="username" name="username" placeholder="Enter your username" value="admin">
                            <i class="bi bi-person-fill input-icon"></i>
                        </div>
                    </div>
                    
                    <div class="form-group">
                        <label for="password">
                            <i class="bi bi-lock"></i>
                            Password
                        </label>
                        <div class="input-wrapper">
                            <input type="password" id="password" name="password" placeholder="Enter your password" value="admin123">
                            <i class="bi bi-lock-fill input-icon"></i>
                            <button type="button" class="toggle-password" onclick="togglePassword()">
                                <i class="bi bi-eye" id="toggleIcon"></i>
                            </button>
                        </div>
                    </div>
                    
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" name="remember">
                            <span>Remember me</span>
                        </label>
                        <a href="#" class="forgot-password">Forgot password?</a>
                    </div>
                    
                    <button type="button" class="login-btn" onclick="showDemo()">
                        <span>Sign In (Demo)</span>
                        <i class="bi bi-arrow-right"></i>
                    </button>
                </form>
                
                <div class="login-footer">
                    <a href="../index.html" class="back-home">
                        <i class="bi bi-house"></i>
                        Back to Website
                    </a>
                </div>
            </div>
            
            <div class="login-info">
                <div class="info-card">
                    <i class="bi bi-shield-check"></i>
                    <h3>Secure Access</h3>
                    <p>Your credentials are encrypted and protected</p>
                </div>
                <div class="info-card">
                    <i class="bi bi-speedometer2"></i>
                    <h3>Fast & Reliable</h3>
                    <p>Manage your content efficiently</p>
                </div>
                <div class="info-card">
                    <i class="bi bi-globe"></i>
                    <h3>Global Reach</h3>
                    <p>Preserve Runyakitara language worldwide</p>
                </div>
            </div>
        </div>
    </div>
    
    <script>
        function togglePassword() {
            const passwordInput = document.getElementById('password');
            const toggleIcon = document.getElementById('toggleIcon');
            
            if (passwordInput.type === 'password') {
                passwordInput.type = 'text';
                toggleIcon.classList.remove('bi-eye');
                toggleIcon.classList.add('bi-eye-slash');
            } else {
                passwordInput.type = 'password';
                toggleIcon.classList.remove('bi-eye-slash');
                toggleIcon.classList.add('bi-eye');
            }
        }
        
        function showDemo() {
            alert('This is a demo preview!\n\nTo enable login:\n1. Start MySQL in XAMPP\n2. Import config/setup.sql\n3. Use login.php instead\n\nDefault credentials:\nUsername: admin\nPassword: admin123');
        }
        
        // Add animation on load
        document.addEventListener('DOMContentLoaded', function() {
            document.querySelector('.login-box').classList.add('animate-in');
            document.querySelectorAll('.info-card').forEach((card, index) => {
                setTimeout(() => {
                    card.classList.add('animate-in');
                }, 200 * (index + 1));
            });
        });
    </script>
</body>
</html>
